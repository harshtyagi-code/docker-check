name: Docker CI Pipeline

on:
  push:

jobs:
  docker-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Show Files
        run: ls

      - name: Build Docker Image
        run: docker build -t my-app .

      - name: Run Docker Container
        run: docker run my-app
